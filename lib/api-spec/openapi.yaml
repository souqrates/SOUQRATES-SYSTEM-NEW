openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Souqrates System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: wallet
    description: SKZ wallet and transactions
  - name: referrals
    description: Referral system
  - name: bots
    description: Sub-bot management
  - name: admin
    description: Admin manager panel
  - name: settings
    description: System settings
  - name: games
    description: Skillz games catalog and sessions
  - name: souq
    description: Souqrates Souq digital marketplace
  - name: subagent
    description: Souqrates Subagent partner platform

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/register:
    post:
      operationId: registerUser
      tags:
        - users
      summary: Register or login a Telegram user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterInput"
      responses:
        "200":
          description: User registered or fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me:
    get:
      operationId: getMe
      tags:
        - users
      summary: Get current user profile
      parameters:
        - name: telegram_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags:
        - users
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags:
        - users
      summary: List all users (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /wallet/balance:
    get:
      operationId: getWalletBalance
      tags:
        - wallet
      summary: Get SKZ balance for a user
      parameters:
        - name: telegram_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"

  /wallet/deposit:
    post:
      operationId: depositWallet
      tags:
        - wallet
      summary: Deposit SKZ via TON or USDT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositInput"
      responses:
        "200":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /wallet/transfer:
    post:
      operationId: transferSkz
      tags:
        - wallet
      summary: Transfer SKZ between users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferInput"
      responses:
        "200":
          description: Transfer complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /wallet/transactions:
    get:
      operationId: listTransactions
      tags:
        - wallet
      summary: List transactions for a user
      parameters:
        - name: telegram_id
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Transactions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /wallet/stats:
    get:
      operationId: getWalletStats
      tags:
        - wallet
      summary: Get global wallet stats for admin dashboard
      responses:
        "200":
          description: Wallet stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletStats"

  /referrals/my:
    get:
      operationId: getMyReferrals
      tags:
        - referrals
      summary: Get referral tree for a user
      parameters:
        - name: telegram_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /referrals/earnings:
    get:
      operationId: getReferralEarnings
      tags:
        - referrals
      summary: Get total referral earnings for a user
      parameters:
        - name: telegram_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Referral earnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralEarnings"

  /referrals/leaderboard:
    get:
      operationId: getReferralLeaderboard
      tags:
        - referrals
      summary: Top referrers leaderboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /bots:
    get:
      operationId: listBots
      tags:
        - bots
      summary: List all sub-bots
      responses:
        "200":
          description: Bots list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"

  /bots/{botId}:
    get:
      operationId: getBot
      tags:
        - bots
      summary: Get bot details
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
    patch:
      operationId: updateBot
      tags:
        - bots
      summary: Update bot settings (admin)
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotUpdate"
      responses:
        "200":
          description: Updated bot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags:
        - admin
      summary: Get admin dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/users/{userId}/ban:
    post:
      operationId: banUser
      tags:
        - admin
      summary: Ban or unban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanInput"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/broadcast:
    post:
      operationId: sendBroadcast
      tags:
        - admin
      summary: Send broadcast message to all users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastInput"
      responses:
        "200":
          description: Broadcast queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResult"

  /admin/transactions:
    get:
      operationId: listAllTransactions
      tags:
        - admin
      summary: List all transactions (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /games:
    get:
      operationId: listGames
      tags:
        - games
      summary: List all games
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Games list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillzGame"

  /games/{gameId}:
    get:
      operationId: getGame
      tags:
        - games
      summary: Get game by ID with tickets
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game with tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillzGameDetail"
    patch:
      operationId: updateGame
      tags:
        - games
      summary: Update game config (admin)
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameConfigUpdate"
      responses:
        "200":
          description: Updated game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillzGame"

  /games/session/start:
    post:
      operationId: startGameSession
      tags:
        - games
      summary: Start a game session (deducts entry fee)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSessionInput"
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSession"

  /games/session/{sessionId}/end:
    post:
      operationId: endGameSession
      tags:
        - games
      summary: End a game session (awards prize if won)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndSessionInput"
      responses:
        "200":
          description: Session ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSessionResult"

  /games/session/history:
    get:
      operationId: getSessionHistory
      tags:
        - games
      summary: Get game session history for a user
      parameters:
        - name: telegram_id
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Session history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionHistoryResponse"

  /games/leaderboard:
    get:
      operationId: fetchLeaderboard
      tags:
        - games
      summary: Get leaderboard for a specific game
      parameters:
        - name: game_id
          in: query
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Game leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameLeaderboardEntry"

  /games/stats:
    get:
      operationId: getGamesStats
      tags:
        - games
      summary: Overall games stats (admin)
      responses:
        "200":
          description: Games stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamesStats"

  /games/{gameId}/tickets:
    patch:
      operationId: updateGameTicket
      tags:
        - games
      summary: Update a specific ticket tier for a game (admin)
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdate"
      responses:
        "200":
          description: Updated tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameTicket"

  /souq/products:
    get:
      operationId: listSouqProducts
      tags:
        - souq
      summary: List all Souq products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SouqProduct"
    post:
      operationId: createSouqProduct
      tags:
        - souq
      summary: Create a new product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SouqProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SouqProduct"

  /souq/products/{productId}:
    get:
      operationId: getSouqProduct
      tags:
        - souq
      summary: Get product by ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SouqProduct"
    patch:
      operationId: updateSouqProduct
      tags:
        - souq
      summary: Update a product (admin)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SouqProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SouqProduct"
    delete:
      operationId: deleteSouqProduct
      tags:
        - souq
      summary: Delete a product (admin)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /souq/purchase/{productId}:
    post:
      operationId: purchaseSouqProduct
      tags:
        - souq
      summary: Purchase a product with SKZ
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SouqPurchaseInput"
      responses:
        "200":
          description: Purchase successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SouqPurchaseResult"

  /souq/my-library:
    get:
      operationId: getMySouqLibrary
      tags:
        - souq
      summary: Get user's purchased products
      parameters:
        - name: telegram_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User library
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SouqLibraryItem"

  /souq/stats:
    get:
      operationId: getSouqStats
      tags:
        - souq
      summary: Souq marketplace stats (admin)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SouqStats"

  /subagent/apply:
    post:
      operationId: applySubagent
      tags:
        - subagent
      summary: Submit partner application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubagentApplicationInput"
      responses:
        "200":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubagentApplicationResponse"
        "409":
          description: Application already exists

  /subagent/me:
    get:
      operationId: getSubagentMe
      tags:
        - subagent
      summary: Get own application status
      parameters:
        - name: telegram_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Application info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubagentMeResponse"
        "404":
          description: No application found

  /subagent/transfer:
    post:
      operationId: subagentTransfer
      tags:
        - subagent
      summary: Send SKZ to user by Telegram ID (approved subagents only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubagentTransferInput"
      responses:
        "200":
          description: Transfer complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "403":
          description: Not an approved subagent

  /subagent/transfers:
    get:
      operationId: listSubagentTransfers
      tags:
        - subagent
      summary: Get transfer history for approved subagent
      parameters:
        - name: telegram_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transfer history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "403":
          description: Not an approved subagent

  /admin/subagent-applications:
    get:
      operationId: listSubagentApplications
      tags:
        - subagent
      summary: List all partner applications (admin)
      responses:
        "200":
          description: Applications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubagentApplicationResponse"

  /admin/subagent-applications/{applicationId}:
    patch:
      operationId: reviewSubagentApplication
      tags:
        - subagent
      summary: Approve or reject a partner application (admin)
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubagentApplicationReview"
      responses:
        "200":
          description: Application updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubagentApplicationResponse"

  /settings:
    get:
      operationId: getSettings
      tags:
        - settings
      summary: Get system settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"
    patch:
      operationId: updateSettings
      tags:
        - settings
      summary: Update system settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      required:
        - id
        - telegramId
        - skzBalance
        - referralCode
        - isAdmin
        - isBanned
        - totalEarned
        - createdAt
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type:
            - string
            - "null"
        firstName:
          type:
            - string
            - "null"
        lastName:
          type:
            - string
            - "null"
        photoUrl:
          type:
            - string
            - "null"
        skzBalance:
          type: number
        referralCode:
          type: string
        referredBy:
          type:
            - integer
            - "null"
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        totalEarned:
          type: number
        createdAt:
          type: string

    UserRegisterInput:
      type: object
      required:
        - telegramId
      properties:
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        photoUrl:
          type: string
        referralCode:
          type: string

    UserListResponse:
      type: object
      required:
        - users
        - total
        - page
        - limit
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    WalletBalance:
      type: object
      required:
        - telegramId
        - skzBalance
        - pendingDeposits
      properties:
        telegramId:
          type: string
        skzBalance:
          type: number
        pendingDeposits:
          type: number
        totalDeposited:
          type: number
        totalWithdrawn:
          type: number

    DepositInput:
      type: object
      required:
        - telegramId
        - amount
        - currency
        - txHash
      properties:
        telegramId:
          type: string
        amount:
          type: number
        currency:
          type: string
          enum:
            - TON
            - USDT
        txHash:
          type: string
        network:
          type: string

    TransferInput:
      type: object
      required:
        - fromTelegramId
        - toTelegramId
        - amount
      properties:
        fromTelegramId:
          type: string
        toTelegramId:
          type: string
        amount:
          type: number
        note:
          type: string

    Transaction:
      type: object
      required:
        - id
        - userId
        - type
        - amount
        - status
        - createdAt
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum:
            - deposit
            - withdraw
            - transfer_in
            - transfer_out
            - commission
            - refund
        amount:
          type: number
        currency:
          type:
            - string
            - "null"
        txHash:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - pending
            - confirmed
            - failed
        note:
          type:
            - string
            - "null"
        refUserId:
          type:
            - integer
            - "null"
        createdAt:
          type: string

    TransactionListResponse:
      type: object
      required:
        - transactions
        - total
        - page
        - limit
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    WalletStats:
      type: object
      required:
        - totalSkzInCirculation
        - totalDeposited
        - totalTransactions
        - activeWallets
      properties:
        totalSkzInCirculation:
          type: number
        totalDeposited:
